name: macOS build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja pkg-config sdl2

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build
        run: cmake --build build --target cnc_mac -j 3

      - name: Test
        run: tests/run_script_tests.sh
